kind = "web"
previewPath = "/"
title = "Plexara"
version = "1.0.0"
id = "artifacts/plexara"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
# Empty paths in production: this is a dev-only Vite server. The production
# deploy ships the built SPA inside the api-server container (via STATIC_DIR
# in artifacts/api-server/.replit-artifact/artifact.toml), and api-server's
# own [[services]] block claims "/". If this service still claimed "/" here,
# the autoscale router would try to forward "/" traffic to localPort 20812
# in the production container — where nothing is listening — and the edge
# proxy would return a bare 500 "Internal Server Error". Dev is unaffected
# because the dev preview pane uses `previewPath`, not `paths`, to route.
paths = []
localPort = 20812

[services.development]
run = "pnpm --filter @workspace/plexara run dev"

# Production deployment intentionally lives in the api-server artifact.
# In autoscale we ship a single container: the api-server runs the Express
# app on port 8080 with STATIC_DIR pointing at this package's `dist/public`,
# so Plexara is served as the SPA fallback by the same Node process.
# Defining `[services.production]` here would create a second exposed port,
# which Cloud Run / autoscale rejects.

[services.env]
PORT = "20812"
BASE_PATH = "/"
