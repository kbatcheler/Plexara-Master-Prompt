kind = "web"
previewPath = "/"
title = "Plexara"
version = "1.0.0"
id = "artifacts/plexara"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20812

[services.development]
run = "pnpm --filter @workspace/plexara run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/plexara", "run", "build" ]
publicDir = "artifacts/plexara/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20812"
BASE_PATH = "/"
