kind = "web"
previewPath = "/"
title = "Plexara"
version = "1.0.0"
id = "artifacts/plexara"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20812

[services.development]
run = "pnpm --filter @workspace/plexara run dev"

# Production deployment intentionally lives in the api-server artifact.
# In autoscale we ship a single container: the api-server runs the Express
# app on port 8080 with STATIC_DIR pointing at this package's `dist/public`,
# so Plexara is served as the SPA fallback by the same Node process.
# Defining `[services.production]` here would create a second exposed port,
# which Cloud Run / autoscale rejects.

[services.env]
PORT = "20812"
BASE_PATH = "/"
