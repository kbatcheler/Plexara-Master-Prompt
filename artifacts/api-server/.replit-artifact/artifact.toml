kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
# In production we ship a SINGLE container: this Express process serves
# both /api/* (route handlers) and the React SPA (express.static + catch-all
# fallback when STATIC_DIR is set). Claiming "/" here makes the autoscale
# router send ALL public traffic to this service. Without this, the router
# tries to forward "/" to the plexara web service's port (20812), which has
# no [services.production] block and isn't running — producing the bare
# "Internal Server Error" the edge proxy returns when no upstream is
# reachable. /api still routes here too because we're the only service.
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
# Build the Plexara SPA first (its bundle is served as static), then build the
# api-server bundle that ships in the container.
build = [
  "sh",
  "-c",
  "pnpm --filter @workspace/plexara run build && pnpm --filter @workspace/api-server run build",
]
# Run the api-server with STATIC_DIR pointing at the built SPA. The Express
# app mounts express.static() + an SPA catch-all when STATIC_DIR is set, so
# this single Node process serves both /api/* and the React app.
# NODE_ENV is forced to production; PORT is provided by the deploy runtime.
run = [
  "sh",
  "-c",
  "NODE_ENV=production STATIC_DIR=artifacts/plexara/dist/public exec node --enable-source-maps artifacts/api-server/dist/index.mjs",
]

[services.production.health.startup]
path = "/api/healthz"
