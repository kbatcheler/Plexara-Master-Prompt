kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
# In autoscale we ship a single container that serves both the API and the
# built Plexara SPA. Build the web app first so its assets are present at
# artifacts/plexara/dist/public, then build the API bundle.
args = [
  "sh",
  "-c",
  "pnpm --filter @workspace/plexara run build && pnpm --filter @workspace/api-server run build",
]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
# we don't run through pnpm to make startup faster in production
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"
# When STATIC_DIR is set, the Express app mounts express.static() and a SPA
# catch-all for everything that isn't /api/*. This makes the api-server the
# single service exposed by autoscale on port 8080.
STATIC_DIR = "artifacts/plexara/dist/public"

[services.production.health.startup]
path = "/api/healthz"
